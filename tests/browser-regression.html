<!doctype html><html lang="en"><head><meta charset="utf-8"><title>1099TaxCalcs Browser Regression</title></head><body><pre id="report">Running…</pre><script>
(async()=>{const routes=['/','/calculators/self-employment-tax/','/calculators/quarterly-tax/','/calculators/1099-take-home-pay/','/calculators/1099-vs-w2/','/calculators/mileage-deduction/','/calculators/home-office-deduction/','/calculators/federal-income-tax/','/calculators/schedule-c-profit/','/calculators/contractor-hourly-rate/','/calculators/business-expense-deduction/','/calculators/1099-tax-reserve/','/calculators/freelance-income/'],results=[];let errors=[];
const wait=ms=>new Promise(r=>setTimeout(r,ms));
for(const route of routes){const frame=document.createElement('iframe');frame.style.width='360px';frame.style.height='800px';frame.src=route;document.body.append(frame);await new Promise((resolve,reject)=>{frame.onload=resolve;setTimeout(()=>reject(new Error('load timeout')),8000)});const w=frame.contentWindow,d=frame.contentDocument;w.addEventListener('error',e=>errors.push(`${route}: ${e.message}`));await wait(100);const form=d.querySelector('.calculator-page form,#quickCalc'),name=form?.id||route;results.push([`${name} loads`,Boolean(form)]);results.push([`${name} tax-year label`,d.body.textContent.includes('2026')]);results.push([`${name} mobile overflow ${d.documentElement.scrollWidth}px culprit ${(()=>{const e=[...d.querySelectorAll('*')].sort((a,b)=>b.getBoundingClientRect().right-a.getBoundingClientRect().right)[0];return e?.tagName+'.'+e?.className+'@'+Math.round(e?.getBoundingClientRect().right)})()}`,[...d.querySelectorAll('body *')].every(e=>e.getBoundingClientRect().right<=w.innerWidth+1)]);const nestedLinks=[...d.querySelectorAll('nav a')].every(a=>{try{return new URL(a.href).origin===location.origin}catch{return false}});results.push([`${name} navigation URLs`,nestedLinks]);if(form){const nums=[...form.querySelectorAll('input[type=number]:not(:disabled)')],required=nums.filter(x=>x.required);required.forEach(x=>x.value='');form.dispatchEvent(new Event('submit',{bubbles:true,cancelable:true}));await wait(30);results.push([`${name} empty validation`,form.querySelectorAll('.field-error').length>0]);nums.forEach(x=>x.value='0');required.forEach(x=>x.value='0');form.dispatchEvent(new Event('submit',{bubbles:true,cancelable:true}));await wait(30);const zeroShouldFail=name==='homeOfficeCalc'||route.includes('contractor-hourly-rate');results.push([`${name} zero values`,zeroShouldFail?form.querySelectorAll('.field-error').length>0:!form.querySelector('.field-error')]);if(nums[0]){nums[0].value='12345.67';form.dispatchEvent(new Event('submit',{bubbles:true,cancelable:true}));await wait(30);results.push([`${name} decimal/results`,Boolean(d.querySelector('.results strong:not(:empty),.quick-result strong'))]);nums[0].value='-1';form.dispatchEvent(new Event('submit',{bubbles:true,cancelable:true}));await wait(30);results.push([`${name} negative validation`,nums[0].getAttribute('aria-invalid')==='true'||Boolean(form.querySelector('.field-error'))]);nums[0].value='999999999999.99';form.dispatchEvent(new Event('submit',{bubbles:true,cancelable:true}));await wait(30);results.push([`${name} large value layout ${d.documentElement.scrollWidth}px`,[...d.querySelectorAll('body *')].every(e=>e.getBoundingClientRect().right<=w.innerWidth+1)])}const pctInput=[...nums].find(x=>/federalRate|stateRate|emergencyRate|businessUse|employeeRate/i.test(x.name));if(pctInput){pctInput.value='101';form.dispatchEvent(new Event('submit',{bubbles:true,cancelable:true}));await wait(30);results.push([`${name} percentage validation`,pctInput.getAttribute('aria-invalid')==='true'])}const copy=d.querySelector('.copy-button');if(copy){copy.click();await wait(60);results.push([`${name} copy action`,copy.isConnected])}form.reset();await wait(30);results.push([`${name} reset`,!form.querySelector('.field-error')])}frame.remove()}
for(const route of ['/','/calculators/','/guides/','/deductions/']){const frame=document.createElement('iframe');frame.style.width='360px';frame.style.height='800px';frame.src=route;document.body.append(frame);await new Promise((resolve,reject)=>{frame.onload=resolve;setTimeout(()=>reject(new Error('search load timeout')),8000)});await wait(150);const d=frame.contentDocument,w=frame.contentWindow,search=d.querySelector('[data-site-search] [data-search-input]'),filter=d.querySelector('[data-site-search] [data-search-filter]');results.push([`${route} search present`,Boolean(search&&filter)]);if(search){search.value='vehicle';search.dispatchEvent(new Event('input',{bubbles:true}));await wait(50);results.push([`${route} search results`,d.querySelectorAll('[data-search-results] li').length>0]);search.value='zzzz-no-result-zzzz';search.dispatchEvent(new Event('input',{bubbles:true}));await wait(30);results.push([`${route} no-result state`,d.body.textContent.includes('No results found')])}results.push([`${route} search mobile overflow`,[...d.querySelectorAll('body *')].every(e=>e.getBoundingClientRect().right<=w.innerWidth+1)]);frame.remove()}
results.push(['No JavaScript errors',errors.length===0]);const passed=results.filter(x=>x[1]).length,failed=results.filter(x=>!x[1]);document.getElementById('report').textContent=JSON.stringify({status:failed.length?'FAIL':'PASS',passed,total:results.length,failed:failed.map(x=>x[0]),errors},null,2);document.title=failed.length?'FAIL':'PASS';})();
</script></body></html>
